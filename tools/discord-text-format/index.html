<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">

    <title>Discord 按鈕編輯文字格式 — 宅宅仔十三</title>
    <link rel="icon" type="image/png" href="../../images/13.png">
    <style>
        :root {
            --bg: #0D1B2A;
            --card: #030b13;
            --text: #fff;
            --muted: rgba(255,255,255,0.6);
            --accent: #F5DEB3;
            --accent-dim: rgba(245,222,179,0.3);
            --accent-bg: rgba(245,222,179,0.05);
            --border: rgba(245,222,179,0.15);
            --danger: #5f0002;
        }

        * { box-sizing: border-box; }

        body {
            font-family: Arial, 'Noto Sans TC', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .top-nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(13, 27, 42, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 10px 16px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            width: 100%;
        }

        .top-nav a {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.85rem;
            letter-spacing: 0.1em;
            padding: 0.4rem 1rem;
            border: 1px solid var(--border);
            border-radius: 999px;
            transition: all 0.3s;
            display: inline-block;
        }

        .top-nav a:hover {
            background: var(--accent-bg);
            border-color: var(--accent);
        }

        .back-to-top {
            position: fixed; bottom: 24px; right: 24px; width: 44px; height: 44px;
            border-radius: 50%; background: rgba(13,27,42,0.9); border: 1px solid var(--border);
            color: var(--accent); font-size: 1.2rem; cursor: pointer; z-index: 999;
            opacity: 0; visibility: hidden; transition: all .3s;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        }
        .back-to-top:hover { background: rgba(245,222,179,0.15); border-color: var(--accent); transform: translateY(-2px); }
        .back-to-top.show { opacity: 1; visibility: visible; }

        h1 {
            color: var(--accent);
            margin-bottom: 5px;
            font-size: 2em;
            text-align: center;
            text-shadow: 0 0 20px rgba(245,222,179,0.3);
            padding: 10px 0;
            letter-spacing: 0.1em;
        }

        .subtitle {
            color: var(--accent);
            margin-bottom: 15px;
            font-size: 1em;
            text-align: center;
            font-weight: 600;
            padding: 5px 15px;
            background-color: var(--accent-bg);
            border-radius: 6px;
            border: 1px solid var(--border);
            display: inline-block;
        }

        .main-container {
            width: 100%;
            max-width: 1400px;
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            align-items: flex-start;
            position: relative;
        }

        .button-section {
            flex: 0 0 200px;
            padding: 15px;
            background: rgba(3, 11, 19, 0.6);
            border: 1px solid var(--border);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 400px;
            overflow-y: auto;
        }

        .button-section h2 {
            color: var(--accent);
            margin: 0 0 15px 0;
            font-size: 1.2em;
            text-align: center;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }

        .button-group-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .button-group-container button {
            width: 100%;
            background: rgba(13, 27, 42, 0.8);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }

        .button-group-container button:hover {
            background: rgba(245,222,179,0.1);
            border-color: var(--accent);
            color: var(--accent);
            transform: translateY(-1px);
        }

        .center-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            min-width: 300px;
        }

        .editor-wrap {
            width: 100%;
            background: var(--card);
            border-radius: 4px;
            border: 1px solid var(--border);
            display: flex;
            height: 400px;
            overflow: hidden;
        }

        .editor-content {
            flex: 1;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #textArea::-webkit-scrollbar-corner { background-color: transparent; }

        #textArea {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 12px;
            border: none;
            background: transparent;
            color: var(--text);
            font-family: Consolas, 'Courier New', monospace;
            font-size: 14px;
            line-height: 21px;
            resize: none;
            outline: none;
            overflow-y: scroll;
            box-sizing: border-box;
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow-x: scroll;
            tab-size: 4;
        }

        #textArea::-webkit-scrollbar { width: 8px; }
        #textArea::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 4px; }
        #textArea::-webkit-scrollbar-thumb { background: rgba(245,222,179,0.2); border-radius: 4px; }
        #textArea::-webkit-scrollbar-thumb:hover { background: rgba(245,222,179,0.35); }
        #textArea::selection { background-color: rgba(245,222,179,0.3); color: white; }

        .button-section::-webkit-scrollbar { width: 8px; }
        .button-section::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 4px; }
        .button-section::-webkit-scrollbar-thumb { background: rgba(245,222,179,0.2); border-radius: 4px; }

        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: var(--card);
            padding: 20px;

            border: 1px solid var(--accent-dim);

            z-index: 1000;

        .modal h3 { color: var(--accent); }

            width: 100%;

            background-color: var(--bg);

        #toast.show { visibility: visible; animation: fadein 0.3s, fadeout 0.3s 1.7s; }

        @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeout { from { opacity: 1; } to { opacity: 0; } }

                border: 1px solid var(--border);

                cursor: pointer;

                transition: all 0.3s ease;

            .menu-toggle.right { right: 10px; top: 10px; }
            .toggle-icon { font-size: 12px; transition: transform 0.3s; }
            .toggle-text { font-size: 14px; white-space: nowrap; }
            .menu-toggle.active .toggle-icon { transform: rotate(90deg); }
            .menu-toggle.right.active .toggle-icon { transform: rotate(-90deg); }

            .button-section {
                display: none;

                width: 200px;

                padding: 15px;
                border-radius: 4px;

            #leftButtonSection { left: 10px; }
            #rightButtonSection { right: 10px; }
            .button-section.active { display: block; }
            .center-content { margin: 50px 0 0 0; width: 100%; }
            .editor-wrap { height: 200px; }

            .stats-bar { flex-wrap: wrap; justify-content: center; }

        @media (max-width: 600px) {
            .button-group { flex-direction: column; }

            #leftButtonSection,
            #rightButtonSection {
                left: 50%;
                transform: translateX(-50%);
                right: auto;
            }
        }

    <script>
        let textArea = document.getElementById('textArea');
        let linkModal = document.getElementById('linkInput');
        let selectedText = '';
        let selectionStart = 0;
        let selectionEnd = 0;
        let undoStack = [''];
        let redoStack = [];
        let currentState = '';
        let isComposing = false;

        function saveState() {
            const newText = textArea.value;
            if (newText !== currentState) {
                undoStack.push(newText);
                currentState = newText;
                redoStack = [];
                updateCharacterCount();
                if (undoStack.length > 100) undoStack.shift();
            }
        }

        function undoLastAction(event) {
            event.preventDefault();
            if (undoStack.length > 1) {
                redoStack.push(textArea.value);
                undoStack.pop();
                const previousText = undoStack[undoStack.length - 1];
                textArea.value = previousText;
                currentState = previousText;
                updateCharacterCount();
                textArea.focus();
            }
        }

        function redoLastAction(event) {
            event.preventDefault();
            if (redoStack.length > 0) {
                const nextText = redoStack.pop();
                undoStack.push(textArea.value);
                textArea.value = nextText;
                currentState = nextText;
                updateCharacterCount();
                textArea.focus();
            }
        }

        function clearText(event) {
            event.preventDefault();
            if (textArea.value !== '') {
                saveState();
                textArea.value = '';
                saveState();
                updateCharacterCount();
                textArea.focus();
                showToast('已清空文字', 'success');
            }
        }

        function copyText(event) {
            event.preventDefault();
            const originalStart = textArea.selectionStart;
            const originalEnd = textArea.selectionEnd;
            textArea.select();
            document.execCommand('copy');
            textArea.setSelectionRange(originalStart, originalEnd);
            textArea.focus();
            showToast('已複製文字！', 'success');
        }

        textArea.addEventListener('input', function() {
            if (!isComposing) { saveState(); updateCharacterCount(); }
        });
        textArea.addEventListener('compositionstart', function() { isComposing = true; });
        textArea.addEventListener('compositionend', function() { isComposing = false; saveState(); updateCharacterCount(); });
        textArea.addEventListener('paste', function() { setTimeout(function() { saveState(); updateCharacterCount(); }, 0); });

        textArea.addEventListener('keydown', function(e) {
            if (e.ctrlKey) {
                if (e.key === 'z') { e.preventDefault(); undoLastAction(e); }
                else if (e.key === 'y') { e.preventDefault(); redoLastAction(e); }
            }
        });

        function processTextByLine(prefix, suffix) {
            updateSelectionState();
            if (!selectedText) { showToast('請先選擇文字', 'warning'); return; }
            const lines = selectedText.split('\n');
            const processedText = lines.map(line => {
                if (line.trim() === '') return '';
                if (line.startsWith(prefix) && line.endsWith(suffix)) return line.slice(prefix.length, -suffix.length);
                return prefix + line + suffix;
            }).join('\n');
            const text = textArea.value;
            textArea.value = text.substring(0, selectionStart) + processedText + text.substring(selectionEnd);
            const newEnd = selectionStart + processedText.length;
            textArea.setSelectionRange(selectionStart, newEnd);
            updateSelectionState(); saveState(); textArea.focus();
        }

        function addHiddenText() { processTextByLine('||', '||'); }
        function addBold() { processTextByLine('**', '**'); }
        function addItalic() { processTextByLine('*', '*'); }
        function addStrikethrough() { processTextByLine('~~', '~~'); }
        function addCode() { processTextByLine('`', '`'); }

        function addCodeBlock() {
            updateSelectionState();
            if (!selectedText) { showToast('請先選擇文字', 'warning'); return; }
            const lines = selectedText.split('\n');
            const processedText = lines.map(line => {
                if (line.trim() === '') return '';
                if (line.startsWith('```') && line.endsWith('```')) return line.slice(3, -3);
                return '```' + line + '```';
            }).join('\n');
            const text = textArea.value;
            textArea.value = text.substring(0, selectionStart) + processedText + text.substring(selectionEnd);
            const newEnd = selectionStart + processedText.length;
            textArea.setSelectionRange(selectionStart, newEnd);
            updateSelectionState(); saveState(); textArea.focus();
        }

        function processLinePrefix(prefix) {
            updateSelectionState();
            if (!selectedText) { showToast('請先選擇文字', 'warning'); return; }
            const lines = selectedText.split('\n');
            const shouldRemove = lines[0].startsWith(prefix);
            const processedText = lines.map(line => {
                if (shouldRemove && line.startsWith(prefix)) return line.substring(prefix.length);
                if (!line.startsWith(prefix)) return prefix + line;
                return line;
            }).join('\n');
            const text = textArea.value;
            textArea.value = text.substring(0, selectionStart) + processedText + text.substring(selectionEnd);
            const newEnd = selectionStart + processedText.length;
            textArea.setSelectionRange(selectionStart, newEnd);
            updateSelectionState(); saveState(); textArea.focus();
        }

        function addQuote() { processLinePrefix('> '); }
        function addParentList() { processLinePrefix('- '); }

        function addNestedList() {
            const lines = selectedText.split('\n');
            const newText = lines.map((line, index) => {
                if (line.startsWith('- ')) return line.substring(2);
                if (line.startsWith('  - ')) return line.substring(4);
                return (index === 0 ? '- ' : '  - ') + line;
            }).join('\n');
            const text = textArea.value;
            textArea.value = text.substring(0, selectionStart) + newText + text.substring(selectionEnd);
            const newSelectionEnd = selectionStart + newText.length;
            textArea.setSelectionRange(selectionStart, newSelectionEnd);
            selectionEnd = newSelectionEnd; selectedText = newText;
            textArea.focus(); saveState();
        }

        function addHeading1() { processLinePrefix('# '); }
        function addHeading2() { processLinePrefix('## '); }
        function addHeading3() { processLinePrefix('### '); }

        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `show ${type}`;
            setTimeout(function() { toast.className = ''; }, 2000);
        }

        const leftMenuToggle = document.getElementById('leftMenuToggle');
        const rightMenuToggle = document.getElementById('rightMenuToggle');
        const leftButtonSection = document.getElementById('leftButtonSection');
        const rightButtonSection = document.getElementById('rightButtonSection');

        leftMenuToggle.addEventListener('click', (e) => {
            e.stopPropagation();
            leftMenuToggle.classList.toggle('active');
            leftButtonSection.classList.toggle('active');
            rightMenuToggle.classList.remove('active');
            rightButtonSection.classList.remove('active');
        });

        rightMenuToggle.addEventListener('click', (e) => {
            e.stopPropagation();
            rightMenuToggle.classList.toggle('active');
            rightButtonSection.classList.toggle('active');
            leftMenuToggle.classList.remove('active');
            leftButtonSection.classList.remove('active');
        });

        document.addEventListener('click', (e) => {
            if (!e.target.closest('#leftButtonSection') && !e.target.closest('#rightButtonSection') && !e.target.closest('.menu-toggle')) {
                leftMenuToggle.classList.remove('active');
                rightMenuToggle.classList.remove('active');
                leftButtonSection.classList.remove('active');
                rightButtonSection.classList.remove('active');
            }
        });

        leftButtonSection.addEventListener('click', (e) => e.stopPropagation());
        rightButtonSection.addEventListener('click', (e) => e.stopPropagation());

        function updateCharacterCount() {
            const text = textArea.value;
            document.getElementById('whiteSpaceCount').textContent = (text.match(/\s/g) || []).length;
            document.getElementById('nonWhiteSpaceCount').textContent = text.replace(/\s/g, '').length;
            document.getElementById('totalCount').textContent = text.length;
        }

        textArea.addEventListener('input', updateCharacterCount);
        textArea.addEventListener('change', updateCharacterCount);
        window.addEventListener('load', updateCharacterCount);

        function addNumberList() {
            if (!selectedText) { showToast('請先選擇文字', 'warning'); return; }
            document.getElementById('numberListModal').style.display = 'block';
            document.getElementById('startNumber').focus();
        }

        function confirmNumberList() {
            const startNum = parseInt(document.getElementById('startNumber').value) || 1;
            const lines = selectedText.split('\n');
            const processedText = lines.map((line, idx) => idx === 0 ? `${startNum}. ${line.trim()}` : `- ${line.trim()}`).join('\n');
            const text = textArea.value;
            textArea.value = text.substring(0, selectionStart) + processedText + text.substring(selectionEnd);
            const newEnd = selectionStart + processedText.length;
            textArea.setSelectionRange(selectionStart, newEnd);
            selectionEnd = newEnd; selectedText = processedText;
            saveState();
            document.getElementById('numberListModal').style.display = 'none';
            document.getElementById('startNumber').value = '1';
            textArea.focus();
        }

        function cancelNumberList() {
            document.getElementById('numberListModal').style.display = 'none';
            document.getElementById('startNumber').value = '1';
            textArea.focus();
        }

        document.getElementById('startNumber').addEventListener('keyup', function(event) {
            if (event.key === 'Enter') confirmNumberList();
        });

        function addLink() {
            selectedText = textArea.value.substring(selectionStart, selectionEnd);
            if (!selectedText) { showToast('請先選擇要添加連結的文字', 'warning'); return; }
            document.getElementById('linkModal').style.display = 'block';
            document.getElementById('linkInput').value = '';
            document.getElementById('linkInput').focus();
        }

        function confirmLink() {
            const linkUrl = document.getElementById('linkInput').value.trim();
            if (!linkUrl) { showToast('請輸入連結網址', 'warning'); return; }
            const text = textArea.value;
            const linkText = `[${selectedText}](${linkUrl})`;
            textArea.value = text.substring(0, selectionStart) + linkText + text.substring(selectionEnd);
            const newEnd = selectionStart + linkText.length;
            textArea.setSelectionRange(selectionStart, newEnd);
            selectionEnd = newEnd; selectedText = linkText;
            document.getElementById('linkModal').style.display = 'none';
            document.getElementById('linkInput').value = '';
            saveState(); textArea.focus();
        }

        function cancelLink() {
            document.getElementById('linkModal').style.display = 'none';
            document.getElementById('linkInput').value = '';
            textArea.focus();
        }

        document.getElementById('linkInput').addEventListener('keyup', function(event) {
            if (event.key === 'Enter') confirmLink();
            else if (event.key === 'Escape') cancelLink();
        });

        window.onclick = function(event) {
            const lm = document.getElementById('linkModal');
            const nm = document.getElementById('numberListModal');
            if (event.target == lm) { lm.style.display = 'none'; document.getElementById('linkInput').value = ''; textArea.focus(); }
            else if (event.target == nm) { nm.style.display = 'none'; document.getElementById('startNumber').value = '1'; textArea.focus(); }
        };

        function selectAllText(event) {
            event.preventDefault();
            textArea.select();
            textArea.focus();
            updateSelectionState();
        }

        textArea.addEventListener('mouseup', updateSelectionState);
        textArea.addEventListener('keyup', updateSelectionState);

        function updateSelectionState() {
            selectionStart = textArea.selectionStart;
            selectionEnd = textArea.selectionEnd;
            selectedText = textArea.value.substring(selectionStart, selectionEnd);
        }

        function addCodeBlockWhole() {
            updateSelectionState();
            if (!selectedText) { showToast('請先選擇文字', 'warning'); return; }
            const isCodeBlock = selectedText.startsWith('```') && selectedText.endsWith('```');
            const processedText = isCodeBlock ? selectedText.slice(3, -3) : '```' + selectedText + '```';
            const text = textArea.value;
            textArea.value = text.substring(0, selectionStart) + processedText + text.substring(selectionEnd);
            const newEnd = selectionStart + processedText.length;
            textArea.setSelectionRange(selectionStart, newEnd);
            updateSelectionState(); saveState(); textArea.focus();
        }
    </script>
</body>
</html>
