<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>軒轅十三－十三工具包</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="images/logo.png" type="image/png">
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .toolkit-hero {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 2rem 1rem;
            margin-top: 70px;
        }

        .toolkit-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        #bgCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .toolkit-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .toolkit-header h2 {
            font-size: 2.5rem;
            color: #F5DEB3;
            margin-bottom: 0.5rem;
            letter-spacing: 0.15em;
            text-shadow: 0 0 20px rgba(245, 222, 179, 0.3);
        }

        .toolkit-header p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 1rem;
            letter-spacing: 0.1em;
        }

        .toolkit-divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1rem auto;
            max-width: 300px;
        }

        .toolkit-divider-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, transparent, #F5DEB3);
        }

        .toolkit-divider-line.right {
            background: linear-gradient(to left, transparent, #F5DEB3);
        }

        .toolkit-divider-diamond {
            width: 8px;
            height: 8px;
            background: #F5DEB3;
            transform: rotate(45deg);
            box-shadow: 0 0 10px rgba(245, 222, 179, 0.4);
        }

        .toolkit-search {
            width: 100%;
            max-width: 500px;
            margin-bottom: 2rem;
            position: relative;
        }

        .toolkit-search input {
            width: 100%;
            padding: 12px 20px 12px 44px;
            background: rgba(3, 11, 19, 0.8);
            border: 1px solid rgba(245, 222, 179, 0.2);
            border-radius: 999px;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s;
            letter-spacing: 0.05em;
        }

        .toolkit-search input:focus {
            border-color: rgba(245, 222, 179, 0.5);
            box-shadow: 0 0 20px rgba(245, 222, 179, 0.08);
        }

        .toolkit-search input::placeholder {
            color: rgba(255, 255, 255, 0.35);
        }

        .toolkit-search::before {
            content: '🔍';
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1rem;
            pointer-events: none;
            z-index: 1;
        }

        .no-result-msg {
            display: none;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.9rem;
            letter-spacing: 0.1em;
            margin-top: 1rem;
        }

        .toolkit-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.2rem;
            max-width: 1000px;
            width: 100%;
            padding: 0 1rem;
        }

        .tool-card {
            position: relative;
            background: linear-gradient(135deg, rgba(3, 11, 19, 0.9), rgba(22, 27, 34, 0.95));
            border: 1px solid rgba(245, 222, 179, 0.15);
            border-radius: 10px;
            padding: 1.4rem 1rem;
            text-align: center;
            overflow: hidden;
            transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }

        .tool-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(to right, transparent, #F5DEB3, transparent);
            transform: scaleX(0);
            transition: transform 0.35s;
        }

        .tool-card:hover {
            transform: translateY(-6px);
            border-color: rgba(245, 222, 179, 0.4);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35), 0 0 20px rgba(245, 222, 179, 0.06);
        }

        .tool-card:hover::before {
            transform: scaleX(1);
        }

        .tool-card:hover .tool-icon {
            transform: scale(1.1);
        }

        .tool-icon {
            font-size: 2rem;
            display: block;
            transition: transform 0.35s;
            position: relative;
            z-index: 1;
        }

        .tool-card-title {
            font-size: 0.95rem;
            color: #F5DEB3;
            letter-spacing: 0.08em;
            font-weight: 600;
            position: relative;
            z-index: 1;
            line-height: 1.4;
        }

        .tool-card-tag {
            display: inline-block;
            padding: 0.2rem 0.7rem;
            border: 1px solid rgba(245, 222, 179, 0.25);
            border-radius: 999px;
            font-size: 0.7rem;
            color: rgba(245, 222, 179, 0.7);
            letter-spacing: 0.12em;
            position: relative;
            z-index: 1;
            transition: all 0.3s;
        }

        .tool-card:hover .tool-card-tag {
            background: rgba(245, 222, 179, 0.1);
            border-color: #F5DEB3;
            color: #F5DEB3;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            font-size: 0.85rem;
            letter-spacing: 0.1em;
            margin-top: 3rem;
            padding: 0.6rem 1.5rem;
            border: 1px solid rgba(245, 222, 179, 0.2);
            border-radius: 999px;
            transition: all 0.3s;
        }

        .back-link:hover {
            color: #F5DEB3;
            border-color: rgba(245, 222, 179, 0.5);
            background: rgba(245, 222, 179, 0.05);
        }

        @media (max-width: 768px) {
            .toolkit-header h2 {
                font-size: 1.8rem;
            }

            .toolkit-grid {
                grid-template-columns: 1fr 1fr;
                gap: 1rem;
            }
        }

        @media (max-width: 480px) {
            .toolkit-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

            <h1 class="logo cyberpunk-text">軒轅十三的個人空間</h1>
        </div>
        <button class="menu-toggle">☰</button>
        <ul class="nav-links">

    <section class="toolkit-hero">
        <div class="toolkit-bg">
            <canvas id="bgCanvas"></canvas>
        </div>

        <div class="toolkit-header">
            <h2>十三工具包</h2>
            <div class="toolkit-divider">
                <div class="toolkit-divider-line"></div>
                <div class="toolkit-divider-diamond"></div>
                <div class="toolkit-divider-line right"></div>
            </div>

        <div class="toolkit-search">
            <input type="text" id="toolSearch" placeholder="搜尋工具名稱或標籤…" oninput="filterTools()">
        </div>

        <div class="toolkit-grid" id="toolGrid">
            <a href="tools/discord-text-format/index.html" class="tool-card" data-keywords="discord 文字格式 編輯器 粗體 斜體 文字編輯">
                <span class="tool-icon">💬</span>

            <a href="tools/qr-code/index.html" class="tool-card" data-keywords="qr 碼 qrcode 產生 掃描 解析">

                <span class="tool-card-tag">QR 碼</span>
            </a>

            <a href="tools/text-converter/index.html" class="tool-card" data-keywords="簡繁 轉換 全形 半形 中文 文字轉換">
                <span class="tool-icon">🔄</span>

                <span class="tool-icon">🍜</span>

                <span class="tool-card-tag">遊戲攻略</span>

            <a href="tools/WWM qiansilin-guide/index.html" class="tool-card" data-keywords="燕雲十六聲 牽絲霖 攻略 奶媽 明川藥典 千香引魂蠱 技能 配置 派別">
                <span class="tool-icon">⚔️</span>

    <script>
        const menuToggle = document.querySelector('.menu-toggle');
        const navLinks = document.querySelector('.nav-links');
        menuToggle.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });

        const canvas = document.getElementById("bgCanvas");
        const ctx = canvas.getContext("2d");

        function resizeCanvas() {
            const heroSection = document.querySelector(".toolkit-hero");
            if (heroSection) {
                canvas.width = window.innerWidth;
                canvas.height = heroSection.offsetHeight;
            }
        }
        window.addEventListener("resize", resizeCanvas);
        resizeCanvas();

        const shapes = [];
        for (let i = 0; i < 50; i++) {
            let r = Math.floor(Math.random() * 80) + 30;
            let g = Math.floor(Math.random() * 80) + 30;
            let b = Math.floor(Math.random() * 80) + 30;
            shapes.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 40 + 10,
                dx: Math.random() * 1.5 - 0.75,
                dy: Math.random() * 1.5 - 0.75,
                color: `rgba(${r}, ${g}, ${b}, 0.5)`
            });
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "rgba(13, 27, 42, 0.95)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            shapes.forEach(shape => {
                ctx.fillStyle = shape.color;
                ctx.beginPath();
                ctx.arc(shape.x, shape.y, shape.size, 0, Math.PI * 2);
                ctx.fill();
                shape.x += shape.dx;
                shape.y += shape.dy;
                if (shape.x <= 0 || shape.x >= canvas.width) shape.dx *= -1;
                if (shape.y <= 0 || shape.y >= canvas.height) shape.dy *= -1;
            });
            requestAnimationFrame(animate);
        }
        animate();

        function filterTools() {
            const query = document.getElementById('toolSearch').value.trim().toLowerCase();
            const cards = document.querySelectorAll('.tool-card');
            let visible = 0;
            cards.forEach(card => {
                const title = card.querySelector('.tool-card-title').textContent.toLowerCase();
                const tag = card.querySelector('.tool-card-tag').textContent.toLowerCase();
                const keywords = (card.dataset.keywords || '').toLowerCase();
                const match = !query || title.includes(query) || tag.includes(query) || keywords.includes(query);
                card.style.display = match ? '' : 'none';
                if (match) visible++;
            });
            document.getElementById('noResultMsg').style.display = visible === 0 ? 'block' : 'none';
        }
    </script>
