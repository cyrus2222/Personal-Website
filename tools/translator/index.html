<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>翻譯工具 — 十三工具包</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root {
            --bg: #0D1B2A; --card: #0a1628; --card2: #060e1a;
            --text: #fff; --muted: rgba(255,255,255,0.55);
            --accent: #F5DEB3; --accent-dim: rgba(245,222,179,0.3);
            --accent-bg: rgba(245,222,179,0.06); --border: rgba(245,222,179,0.15);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, "Microsoft JhengHei", "Noto Sans TC", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        .wrap { max-width: 960px; margin: 0 auto; padding: 16px; }

        .top-nav {
            position: sticky; top: 0; z-index: 100;
            background: rgba(13,27,42,0.95); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border); padding: 10px 16px;
            display: flex; gap: 10px; flex-wrap: wrap; margin: -16px -16px 12px; width: calc(100% + 32px);
        }
        .top-nav a { color: var(--accent); text-decoration: none; font-size: .85rem; letter-spacing: .1em; padding: .4rem 1rem; border: 1px solid var(--border); border-radius: 999px; transition: all .3s; display: inline-block; }
        .top-nav a:hover { background: var(--accent-bg); border-color: var(--accent); }

        h1 { text-align: center; color: var(--accent); font-size: 1.7rem; margin: 16px 0 20px; letter-spacing: .08em; text-shadow: 0 0 18px rgba(245,222,179,.2); }

        /* Tabs */
        .mode-tabs {
            display: flex; justify-content: center; gap: 4px; margin-bottom: 18px;
            background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 4px; max-width: 320px; margin-left: auto; margin-right: auto;
        }
        .mode-tab {
            flex: 1; padding: 9px 16px; background: transparent; border: none; color: var(--muted);
            border-radius: 8px; cursor: pointer; font-size: .88rem; letter-spacing: .06em; transition: all .2s; font-family: inherit;
        }
        .mode-tab.active { background: var(--accent); color: #0D1B2A; font-weight: 600; }
        .mode-tab:not(.active):hover { color: var(--accent); }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .lang-bar {
            display: flex; align-items: center; gap: 8px; margin-bottom: 16px;
        }
        .lang-bar select {
            flex: 1; padding: 10px 14px; background: var(--card); color: var(--text);
            border: 1px solid var(--border); border-radius: 8px; font-size: .9rem; outline: none;
            cursor: pointer; transition: border-color .2s;
        }
        .lang-bar select:focus { border-color: var(--accent-dim); }
        .lang-bar select option { background: var(--card2); color: var(--text); }

        .swap-btn {
            width: 40px; height: 40px; border-radius: 50%; background: var(--card);
            border: 1px solid var(--border); color: var(--accent); font-size: 1.1rem;
            cursor: pointer; transition: all .2s; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .swap-btn:hover { background: var(--accent-bg); border-color: var(--accent); transform: rotate(180deg); }

        .panels { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
        @media (max-width: 700px) { .panels { grid-template-columns: 1fr; } }

        .panel { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px; position: relative; }
        .panel-label { color: var(--muted); font-size: .78rem; letter-spacing: .08em; margin-bottom: 8px; }
        .panel textarea {
            width: 100%; min-height: 200px; resize: vertical; background: transparent; color: var(--text);
            border: none; font-size: 1rem; line-height: 1.7; font-family: inherit; outline: none;
        }
        .panel textarea::placeholder { color: rgba(255,255,255,0.25); }

        .panel-actions {
            display: flex; gap: 6px; justify-content: flex-end; margin-top: 8px; border-top: 1px solid rgba(245,222,179,0.08); padding-top: 8px; flex-wrap: wrap;
        }
        .sm-btn {
            padding: 6px 14px; background: var(--card2); border: 1px solid var(--border); color: var(--muted);
            border-radius: 6px; cursor: pointer; font-size: .78rem; transition: all .2s;
        }
        .sm-btn:hover { border-color: var(--accent); color: var(--accent); }

        .translate-btn {
            display: block; width: 100%; padding: 14px; background: var(--accent);
            color: #0D1B2A; border: none; border-radius: 10px; font-size: 1rem;
            font-weight: 600; letter-spacing: .1em; cursor: pointer; transition: all .2s;
        }
        .translate-btn:hover { box-shadow: 0 0 20px rgba(245,222,179,0.2); transform: translateY(-1px); }
        .translate-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

        .quick-langs {
            display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; justify-content: center;
        }
        .ql-btn {
            padding: 5px 12px; background: var(--card); border: 1px solid var(--border); color: var(--muted);
            border-radius: 999px; cursor: pointer; font-size: .75rem; transition: all .2s; white-space: nowrap;
        }
        .ql-btn:hover { border-color: var(--accent); color: var(--accent); }
        .ql-btn.active { background: var(--accent); color: #0D1B2A; border-color: var(--accent); font-weight: 600; }

        .char-count { color: var(--muted); font-size: .72rem; position: absolute; bottom: 36px; right: 14px; }

        .detected-lang { color: var(--accent); font-size: .75rem; font-style: italic; margin-left: 4px; }

        #toast { position: fixed; top: 18px; right: 18px; padding: 12px 20px; border-radius: 6px; color: #fff; font-size: .85rem; z-index: 9999; opacity: 0; transition: opacity .3s; pointer-events: none; }
        #toast.show { opacity: 1; } #toast.success { background: #2e7d32; } #toast.warning { background: #c62828; }

        .footer { text-align: center; color: var(--muted); font-size: .78rem; padding: 24px 0; margin-top: 20px; border-top: 1px solid var(--border); }
        .footer a { color: var(--accent); text-decoration: none; } .footer a:hover { text-decoration: underline; }

        .back-to-top {
            position: fixed; bottom: 24px; right: 24px; width: 44px; height: 44px;
            border-radius: 50%; background: rgba(13,27,42,0.9); border: 1px solid var(--border);
            color: var(--accent); font-size: 1.2rem; cursor: pointer; z-index: 999;
            opacity: 0; visibility: hidden; transition: all .3s;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        }
        .back-to-top:hover { background: rgba(245,222,179,0.15); border-color: var(--accent); transform: translateY(-2px); }
        .back-to-top.show { opacity: 1; visibility: visible; }

        .info-note {
            text-align: center; color: var(--muted); font-size: .75rem; margin: 12px 0 0;
            padding: 10px; background: var(--card); border: 1px solid var(--border); border-radius: 8px;
        }
        .info-note a { color: var(--accent); }

        .loading { display: none; text-align: center; padding: 20px; color: var(--muted); font-size: .9rem; }
        .loading.show { display: block; }

        /* ===== Image Translation ===== */
        .img-ocr-lang {
            display: flex; align-items: center; gap: 8px; margin-bottom: 14px; flex-wrap: wrap;
        }
        .img-ocr-lang label { color: var(--muted); font-size: .82rem; letter-spacing: .06em; white-space: nowrap; }
        .img-ocr-lang select {
            padding: 8px 12px; background: var(--card); color: var(--text);
            border: 1px solid var(--border); border-radius: 8px; font-size: .85rem; outline: none; cursor: pointer;
        }
        .img-ocr-lang select option { background: var(--card2); }

        .drop-zone {
            border: 2px dashed var(--border); border-radius: 12px; padding: 40px 20px;
            text-align: center; cursor: pointer; transition: all .3s; position: relative;
            background: var(--card); min-height: 200px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px;
        }
        .drop-zone:hover, .drop-zone.drag-over { border-color: var(--accent); background: var(--accent-bg); }
        .drop-zone-icon { font-size: 2.8rem; opacity: .7; }
        .drop-zone-text { color: var(--muted); font-size: .88rem; line-height: 1.6; }
        .drop-zone-text strong { color: var(--accent); }
        .drop-zone-hint { color: rgba(255,255,255,0.3); font-size: .72rem; }
        .drop-zone input[type="file"] { display: none; }

        .img-preview-wrap {
            display: none; margin-bottom: 16px; position: relative;
            background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 10px; text-align: center;
        }
        .img-preview-wrap.show { display: block; }
        .img-preview-wrap img { max-width: 100%; max-height: 400px; border-radius: 6px; display: block; margin: 0 auto; }
        .img-remove-btn {
            position: absolute; top: 6px; right: 6px; width: 30px; height: 30px; border-radius: 50%;
            background: rgba(0,0,0,0.7); border: 1px solid var(--border); color: #fff;
            font-size: .9rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .2s;
        }
        .img-remove-btn:hover { background: #c62828; border-color: #c62828; }

        .ocr-progress {
            display: none; margin: 16px 0; padding: 16px; background: var(--card); border: 1px solid var(--border); border-radius: 10px;
        }
        .ocr-progress.show { display: block; }
        .ocr-progress-text { color: var(--muted); font-size: .82rem; margin-bottom: 8px; text-align: center; }
        .ocr-progress-bar { width: 100%; height: 6px; background: var(--card2); border-radius: 3px; overflow: hidden; }
        .ocr-progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width .3s; width: 0%; }

        .img-panels { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
        @media (max-width: 700px) { .img-panels { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="wrap">
    <div class="top-nav">
        <a href="../../toolkit.html">← 返回十三工具包</a>
        <a href="../../index.html">← 返回主站</a>
    </div>

    <h1>翻譯工具</h1>

    <div class="mode-tabs">
        <button class="mode-tab active" onclick="switchMode('text')">文字翻譯</button>
        <button class="mode-tab" onclick="switchMode('image')">圖片翻譯</button>
    </div>

    <!-- ========== Text Translation Tab ========== -->
    <div id="tabText" class="tab-content active">
        <div class="quick-langs">
            <button class="ql-btn" onclick="quickSet('auto','zh-TW')">自動→繁中</button>
            <button class="ql-btn" onclick="quickSet('auto','en')">自動→英文</button>
            <button class="ql-btn" onclick="quickSet('zh-TW','en')">繁中→英文</button>
            <button class="ql-btn" onclick="quickSet('en','zh-TW')">英文→繁中</button>
            <button class="ql-btn" onclick="quickSet('zh-TW','ja')">繁中→日文</button>
            <button class="ql-btn" onclick="quickSet('ja','zh-TW')">日文→繁中</button>
            <button class="ql-btn" onclick="quickSet('zh-CN','zh-TW')">簡中→繁中</button>
            <button class="ql-btn" onclick="quickSet('zh-TW','ko')">繁中→韓文</button>
        </div>

        <div class="lang-bar">
            <select id="srcLang"></select>
            <button class="swap-btn" onclick="swapLangs()" title="交換語言">⇄</button>
            <select id="tgtLang"></select>
        </div>

        <div class="panels">
            <div class="panel">
                <div class="panel-label">原文<span class="detected-lang" id="detectedLang"></span></div>
                <textarea id="srcText" placeholder="輸入或貼上要翻譯的文字…" oninput="onInput()"></textarea>
                <span class="char-count" id="srcCount">0</span>
                <div class="panel-actions">
                    <button class="sm-btn" onclick="clearSrc()">清空</button>
                    <button class="sm-btn" onclick="pasteSrc()">貼上</button>
                    <button class="sm-btn" onclick="copySrc()">複製原文</button>
                </div>
            </div>
            <div class="panel">
                <div class="panel-label">譯文</div>
                <textarea id="tgtText" readonly placeholder="翻譯結果會顯示在這裡"></textarea>
                <span class="char-count" id="tgtCount">0</span>
                <div class="panel-actions">
                    <button class="sm-btn" onclick="copyTgt()">複製譯文</button>
                    <button class="sm-btn" onclick="openInGoogle()">在 Google 翻譯開啟</button>
                </div>
            </div>
        </div>

        <button class="translate-btn" id="translateBtn" onclick="doTranslate()">翻譯</button>
        <p class="loading" id="loading">翻譯中…</p>
    </div>

    <!-- ========== Image Translation Tab ========== -->
    <div id="tabImage" class="tab-content">
        <div class="img-ocr-lang">
            <label>圖片文字語言：</label>
            <select id="ocrLang">
                <option value="eng+chi_tra">繁體中文 + 英文</option>
                <option value="eng+chi_sim">簡體中文 + 英文</option>
                <option value="eng">英文</option>
                <option value="chi_tra">繁體中文</option>
                <option value="chi_sim">簡體中文</option>
                <option value="jpn">日文</option>
                <option value="kor">韓文</option>
                <option value="fra">法文</option>
                <option value="deu">德文</option>
                <option value="spa">西班牙文</option>
                <option value="por">葡萄牙文</option>
                <option value="rus">俄文</option>
                <option value="ara">阿拉伯文</option>
                <option value="tha">泰文</option>
                <option value="vie">越南文</option>
            </select>
            <label style="margin-left:auto;">翻譯目標：</label>
            <select id="imgTgtLang"></select>
        </div>

        <div class="drop-zone" id="dropZone">
            <div class="drop-zone-icon">🖼️</div>
            <div class="drop-zone-text">
                拖放圖片到此處，或<strong>點擊選擇檔案</strong><br>
                也可以直接 <strong>Ctrl+V</strong> 貼上剪貼簿中的圖片
            </div>
            <div class="drop-zone-hint">支援 JPG、PNG、WebP、BMP 格式</div>
            <input type="file" id="imgFileInput" accept="image/*">
        </div>

        <div class="img-preview-wrap" id="imgPreview">
            <button class="img-remove-btn" onclick="removeImage()" title="移除圖片">✕</button>
            <img id="imgPreviewImg" src="" alt="預覽">
        </div>

        <div class="ocr-progress" id="ocrProgress">
            <div class="ocr-progress-text" id="ocrProgressText">正在辨識文字…</div>
            <div class="ocr-progress-bar"><div class="ocr-progress-fill" id="ocrProgressFill"></div></div>
        </div>

        <div class="img-panels">
            <div class="panel">
                <div class="panel-label">辨識出的原文<span class="detected-lang" id="imgDetectedLang"></span></div>
                <textarea id="imgSrcText" placeholder="圖片中辨識出的文字會顯示在這裡，也可以直接輸入修改…" oninput="onImgSrcInput()"></textarea>
                <div class="panel-actions">
                    <button class="sm-btn" onclick="copyText('imgSrcText','已複製辨識文字')">複製原文</button>
                    <button class="sm-btn" onclick="sendToTextMode()">送至文字翻譯</button>
                </div>
            </div>
            <div class="panel">
                <div class="panel-label">譯文</div>
                <textarea id="imgTgtText" readonly placeholder="翻譯結果會顯示在這裡"></textarea>
                <div class="panel-actions">
                    <button class="sm-btn" onclick="copyText('imgTgtText','已複製譯文')">複製譯文</button>
                </div>
            </div>
        </div>

        <p class="loading" id="imgLoading">翻譯中…</p>
    </div>

    <div class="info-note">
        翻譯服務由 Google 翻譯提供 · 圖片文字辨識由 <a href="https://github.com/naptha/tesseract.js" target="_blank" rel="noopener">Tesseract.js</a> 提供 ·
        <a href="https://translate.google.com.tw/?hl=zh-TW" target="_blank" rel="noopener">前往 Google 翻譯完整版</a>
    </div>

    <div class="footer">
        <a href="../../toolkit.html">返回十三工具包</a> · <a href="../../index.html">軒轅十三的個人空間</a>
        <p style="margin-top:8px;">版權所有 © 2025 軒轅十三</p>
    </div>
</div>

<button class="back-to-top" id="backToTop" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="返回頂部">↑</button>
<div id="toast"></div>

<script>
const LANGUAGES = [
    ['auto', '自動偵測'],
    ['zh-TW', '繁體中文'], ['zh-CN', '簡體中文'], ['en', '英文'],
    ['ja', '日文'], ['ko', '韓文'], ['fr', '法文'], ['de', '德文'],
    ['es', '西班牙文'], ['pt', '葡萄牙文'], ['it', '義大利文'], ['ru', '俄文'],
    ['ar', '阿拉伯文'], ['th', '泰文'], ['vi', '越南文'], ['id', '印尼文'],
    ['ms', '馬來文'], ['hi', '北印度文'], ['nl', '荷蘭文'], ['pl', '波蘭文'],
    ['tr', '土耳其文'], ['uk', '烏克蘭文'], ['cs', '捷克文'], ['sv', '瑞典文'],
    ['da', '丹麥文'], ['fi', '芬蘭文'], ['el', '希臘文'], ['hu', '匈牙利文'],
    ['ro', '羅馬尼亞文'], ['bg', '保加利亞文'], ['hr', '克羅埃西亞文'],
    ['sk', '斯洛伐克文'], ['sl', '斯洛維尼亞文'], ['lt', '立陶宛文'],
    ['lv', '拉脫維亞文'], ['et', '愛沙尼亞文'], ['he', '希伯來文'],
    ['fa', '波斯文'], ['bn', '孟加拉文'], ['ta', '泰米爾文'],
    ['te', '泰盧固文'], ['ml', '馬拉雅拉姆文'], ['km', '高棉文'],
    ['my', '緬甸文'], ['lo', '寮文'], ['ka', '喬治亞文'],
    ['mn', '蒙古文'], ['ne', '尼泊爾文'], ['si', '錫蘭文'],
    ['sw', '斯瓦希里文'], ['tl', '菲律賓文'], ['af', '南非文'],
    ['la', '拉丁文'], ['eo', '世界語']
];

const TGT_LANGUAGES = LANGUAGES.filter(l => l[0] !== 'auto');

const srcSel = document.getElementById('srcLang');
const tgtSel = document.getElementById('tgtLang');
const imgTgtSel = document.getElementById('imgTgtLang');

LANGUAGES.forEach(([code, name]) => {
    srcSel.add(new Option(name, code));
});
TGT_LANGUAGES.forEach(([code, name]) => {
    tgtSel.add(new Option(name, code));
    imgTgtSel.add(new Option(name, code));
});

srcSel.value = 'auto';
tgtSel.value = 'zh-TW';
imgTgtSel.value = 'zh-TW';

/* ===== Mode Tabs ===== */
let currentMode = 'text';
function switchMode(mode) {
    currentMode = mode;
    document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    if (mode === 'text') {
        document.querySelector('.mode-tab:nth-child(1)').classList.add('active');
        document.getElementById('tabText').classList.add('active');
    } else {
        document.querySelector('.mode-tab:nth-child(2)').classList.add('active');
        document.getElementById('tabImage').classList.add('active');
    }
}

/* ===== Text Translation ===== */
let debounceTimer = null;

function onInput() {
    const text = document.getElementById('srcText').value;
    document.getElementById('srcCount').textContent = text.length;
    document.getElementById('detectedLang').textContent = '';
    clearTimeout(debounceTimer);
    if (text.trim()) {
        debounceTimer = setTimeout(() => doTranslate(), 800);
    }
}

function smartDetectLang(text, googleSrc) {
    const cleaned = text.replace(/[\s\d\p{P}\p{S}]/gu, '');
    if (!cleaned || cleaned.length < 2) return googleSrc;
    let cjk = 0, hira = 0, kata = 0, hangul = 0, latin = 0, cyrillic = 0, arabic = 0, thai = 0, deva = 0;
    for (const ch of cleaned) {
        const c = ch.codePointAt(0);
        if ((c >= 0x4E00 && c <= 0x9FFF) || (c >= 0x3400 && c <= 0x4DBF) || (c >= 0x20000 && c <= 0x2A6DF) || (c >= 0xF900 && c <= 0xFAFF)) cjk++;
        else if (c >= 0x3040 && c <= 0x309F) hira++;
        else if (c >= 0x30A0 && c <= 0x30FF) kata++;
        else if ((c >= 0xAC00 && c <= 0xD7AF) || (c >= 0x1100 && c <= 0x11FF)) hangul++;
        else if (c >= 0x0041 && c <= 0x024F) latin++;
        else if (c >= 0x0400 && c <= 0x04FF) cyrillic++;
        else if (c >= 0x0600 && c <= 0x06FF) arabic++;
        else if (c >= 0x0E00 && c <= 0x0E7F) thai++;
        else if (c >= 0x0900 && c <= 0x097F) deva++;
    }
    const t = cleaned.length;
    if ((hira + kata) > 0 && (hira + kata + cjk) / t > 0.3) return 'ja';
    if (hangul / t > 0.3) return 'ko';
    if (cjk / t > 0.3) return (googleSrc === 'zh-TW' || googleSrc === 'zh-CN') ? googleSrc : 'zh-TW';
    if (thai / t > 0.3) return 'th';
    if (deva / t > 0.3) return 'hi';
    if (arabic / t > 0.3) return googleSrc || 'ar';
    if (cyrillic / t > 0.3) return googleSrc || 'ru';
    if (latin / t > 0.3) return googleSrc;
    return googleSrc;
}

async function translateText(text, sl, tl) {
    const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sl}&tl=${tl}&dt=t&dt=bd&dj=1&q=${encodeURIComponent(text)}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('翻譯請求失敗');
    const data = await res.json();
    let translated = '';
    if (data.sentences) translated = data.sentences.map(s => s.trans || '').join('');
    const rawSrc = data.src || null;
    const smartSrc = rawSrc ? smartDetectLang(text, rawSrc) : null;
    return { translated, detectedSrc: smartSrc };
}

async function doTranslate() {
    const src = document.getElementById('srcText').value.trim();
    if (!src) { toast('請輸入要翻譯的文字', 'warning'); return; }
    const sl = srcSel.value;
    const tl = tgtSel.value;
    const btn = document.getElementById('translateBtn');
    const loading = document.getElementById('loading');
    btn.disabled = true;
    loading.classList.add('show');
    try {
        const { translated, detectedSrc } = await translateText(src, sl, tl);
        document.getElementById('tgtText').value = translated;
        document.getElementById('tgtCount').textContent = translated.length;
        if (detectedSrc && sl === 'auto') {
            const det = LANGUAGES.find(l => l[0] === detectedSrc);
            document.getElementById('detectedLang').textContent = det ? `(偵測到：${det[1]})` : '';
        } else {
            document.getElementById('detectedLang').textContent = '';
        }
    } catch (err) {
        toast('翻譯失敗：' + err.message, 'warning');
    } finally {
        btn.disabled = false;
        loading.classList.remove('show');
    }
}

function swapLangs() {
    const sl = srcSel.value;
    const tl = tgtSel.value;
    if (sl === 'auto') { toast('自動偵測無法交換', 'warning'); return; }
    srcSel.value = tl; tgtSel.value = sl;
    const srcT = document.getElementById('srcText');
    const tgtT = document.getElementById('tgtText');
    const tmp = srcT.value; srcT.value = tgtT.value; tgtT.value = tmp;
    document.getElementById('srcCount').textContent = srcT.value.length;
    document.getElementById('tgtCount').textContent = tgtT.value.length;
    document.getElementById('detectedLang').textContent = '';
}

function quickSet(sl, tl) {
    srcSel.value = sl; tgtSel.value = tl;
    document.querySelectorAll('.ql-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    if (document.getElementById('srcText').value.trim()) doTranslate();
}

function clearSrc() {
    document.getElementById('srcText').value = '';
    document.getElementById('tgtText').value = '';
    document.getElementById('srcCount').textContent = '0';
    document.getElementById('tgtCount').textContent = '0';
    document.getElementById('detectedLang').textContent = '';
    document.getElementById('srcText').focus();
}

async function pasteSrc() {
    try {
        const text = await navigator.clipboard.readText();
        document.getElementById('srcText').value = text;
        document.getElementById('srcCount').textContent = text.length;
        doTranslate();
    } catch { toast('無法存取剪貼簿', 'warning'); }
}

async function copySrc() {
    const text = document.getElementById('srcText').value;
    if (!text) return;
    await navigator.clipboard.writeText(text);
    toast('已複製原文', 'success');
}

async function copyTgt() {
    const text = document.getElementById('tgtText').value;
    if (!text) return;
    await navigator.clipboard.writeText(text);
    toast('已複製譯文', 'success');
}

async function copyText(id, msg) {
    const text = document.getElementById(id).value;
    if (!text) return;
    await navigator.clipboard.writeText(text);
    toast(msg, 'success');
}

function openInGoogle() {
    const src = document.getElementById('srcText').value;
    const sl = srcSel.value;
    const tl = tgtSel.value;
    window.open(`https://translate.google.com.tw/?hl=zh-TW&sl=${sl}&tl=${tl}&text=${encodeURIComponent(src)}&op=translate`, '_blank');
}

/* ===== Image Translation ===== */
let currentImageData = null;

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('imgFileInput');

dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => { if (e.target.files[0]) handleImageFile(e.target.files[0]); });

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) handleImageFile(file);
    else toast('請拖放圖片檔案', 'warning');
});

document.addEventListener('paste', e => {
    if (currentMode !== 'image') return;
    const items = e.clipboardData?.items;
    if (!items) return;
    for (const item of items) {
        if (item.type.startsWith('image/')) {
            e.preventDefault();
            handleImageFile(item.getAsFile());
            return;
        }
    }
});

function handleImageFile(file) {
    const reader = new FileReader();
    reader.onload = e => {
        currentImageData = e.target.result;
        document.getElementById('imgPreviewImg').src = currentImageData;
        document.getElementById('imgPreview').classList.add('show');
        dropZone.style.display = 'none';
        doImageTranslate();
    };
    reader.readAsDataURL(file);
}

function removeImage() {
    currentImageData = null;
    document.getElementById('imgPreview').classList.remove('show');
    dropZone.style.display = '';
    fileInput.value = '';
    document.getElementById('imgSrcText').value = '';
    document.getElementById('imgTgtText').value = '';
    document.getElementById('imgDetectedLang').textContent = '';
}

async function doImageTranslate() {
    if (!currentImageData) { toast('請先上傳或貼上一張圖片', 'warning'); return; }

    const ocrLang = document.getElementById('ocrLang').value;
    const tl = imgTgtSel.value;
    const progress = document.getElementById('ocrProgress');
    const progressText = document.getElementById('ocrProgressText');
    const progressFill = document.getElementById('ocrProgressFill');

    progress.classList.add('show');
    progressText.textContent = '正在載入 OCR 引擎…';
    progressFill.style.width = '5%';

    try {
        const result = await Tesseract.recognize(currentImageData, ocrLang, {
            logger: m => {
                if (m.status === 'recognizing text') {
                    const pct = Math.round(m.progress * 100);
                    progressText.textContent = `正在辨識文字… ${pct}%`;
                    progressFill.style.width = pct + '%';
                } else if (m.status === 'loading language traineddata') {
                    progressText.textContent = '正在下載語言資料…';
                    progressFill.style.width = Math.round(m.progress * 50) + '%';
                } else if (m.status === 'initializing api') {
                    progressText.textContent = '正在初始化辨識引擎…';
                    progressFill.style.width = '3%';
                }
            }
        });

        const ocrText = result.data.text.trim();
        document.getElementById('imgSrcText').value = ocrText;

        if (!ocrText) {
            toast('未能從圖片中辨識出文字', 'warning');
            progress.classList.remove('show');
            return;
        }

        progressText.textContent = '辨識完成，正在翻譯…';
        progressFill.style.width = '100%';

        const { translated, detectedSrc } = await translateText(ocrText, 'auto', tl);
        document.getElementById('imgTgtText').value = translated;
        if (detectedSrc) {
            const det = LANGUAGES.find(l => l[0] === detectedSrc);
            document.getElementById('imgDetectedLang').textContent = det ? `(偵測到：${det[1]})` : '';
        }

        toast('圖片翻譯完成', 'success');
    } catch (err) {
        toast('圖片辨識失敗：' + err.message, 'warning');
    } finally {
        setTimeout(() => progress.classList.remove('show'), 1000);
    }
}

let imgDebounce = null;
async function onImgSrcInput() {
    clearTimeout(imgDebounce);
    const text = document.getElementById('imgSrcText').value.trim();
    if (!text) { document.getElementById('imgTgtText').value = ''; return; }
    imgDebounce = setTimeout(async () => {
        try {
            const tl = imgTgtSel.value;
            const { translated, detectedSrc } = await translateText(text, 'auto', tl);
            document.getElementById('imgTgtText').value = translated;
            if (detectedSrc) {
                const det = LANGUAGES.find(l => l[0] === detectedSrc);
                document.getElementById('imgDetectedLang').textContent = det ? `(偵測到：${det[1]})` : '';
            }
        } catch (err) { toast('翻譯失敗：' + err.message, 'warning'); }
    }, 600);
}

function sendToTextMode() {
    const text = document.getElementById('imgSrcText').value;
    if (!text) return;
    document.getElementById('srcText').value = text;
    document.getElementById('srcCount').textContent = text.length;
    switchMode('text');
    doTranslate();
}

/* ===== Shared ===== */
function toast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `show ${type}`;
    setTimeout(() => { t.className = ''; }, 2500);
}

window.addEventListener('scroll', () => {
    const b = document.getElementById('backToTop');
    if (window.scrollY > 300) b.classList.add('show'); else b.classList.remove('show');
});

document.getElementById('srcText').addEventListener('keydown', e => {
    if (e.ctrlKey && e.key === 'Enter') { e.preventDefault(); doTranslate(); }
});
</script>
